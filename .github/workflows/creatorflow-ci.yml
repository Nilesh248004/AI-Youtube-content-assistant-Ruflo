name: CreatorFlow AI CI

on:
  push:
    paths:
      - "creatorflow-ai/**"
      - ".github/workflows/creatorflow-ci.yml"
  pull_request:
    paths:
      - "creatorflow-ai/**"
      - ".github/workflows/creatorflow-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: creatorflow-ai/backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r creatorflow-ai/backend/requirements-dev.txt

      - name: Test backend
        env:
          LLM_PROVIDER: dummy
        run: python -m pytest creatorflow-ai/backend/tests -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: creatorflow-ai/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix creatorflow-ai/frontend

      - name: Build frontend
        run: npm run build --prefix creatorflow-ai/frontend
